
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Competitions | MedScenario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%); font-family: 'Inter', sans-serif; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .topnav {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 12px 24px; border-radius: 28px;
            margin-bottom: 28px; flex-wrap: wrap;
        }
        .logo { font-weight: 800; background: linear-gradient(135deg, #2563eb, #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; font-size: 1.6rem; cursor: pointer; }
        .navlinks { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
        .navlinks a { text-decoration: none; color: #4b5563; font-weight: 500; }
        .navlinks a:hover { color: #2563eb; }
        .profile { width: 42px; height: 42px; background: linear-gradient(135deg, #2563eb, #7c3aed); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; cursor: pointer; }
        .nav-right { position: relative; display: flex; gap: 20px; align-items: center; }
        .dropdown-menu { position: absolute; top: 55px; right: 0; background: white; border-radius: 20px; padding: 12px 0; min-width: 180px; display: none; z-index: 100; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .dropdown-menu.show { display: block; }
        .dropdown-menu a, .dropdown-menu button { display: block; width: 100%; padding: 10px 20px; text-align: left; background: none; border: none; cursor: pointer; }

        .admin-hero { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 32px; padding: 32px; margin-bottom: 32px; color: white; }
        .admin-hero h1 { font-size: 2rem; margin-bottom: 8px; }

        .form-card { background: white; border-radius: 32px; padding: 28px; margin-bottom: 28px; }
        .form-card h2 { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 16px;
            font-size: 1rem; font-family: 'Inter', sans-serif;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; border: none; padding: 14px 28px; border-radius: 40px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .btn-danger { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }

        .questions-list { margin-top: 24px; }
        .question-item { background: #f8fafc; border-radius: 20px; padding: 20px; margin-bottom: 16px; }
        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .question-text { font-weight: 700; margin-bottom: 10px; }
        .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 12px 0; }
        .option { background: white; padding: 8px 12px; border-radius: 12px; border: 1px solid #e2e8f0; }

        .competitions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; margin-top: 24px; }
        .comp-card { background: white; border-radius: 28px; padding: 20px; border: 1px solid #eef2ff; }
        .comp-status { display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 700; margin-top: 10px; }
        .status-upcoming { background: #fef3c7; color: #92400e; }
        .status-active { background: #dcfce7; color: #166534; }
        .status-ended { background: #e2e8f0; color: #475569; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 28px; border-radius: 60px; z-index: 2100; display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="topnav">
        <div class="logo" onclick="location.href='index.html'"><i class="fas fa-heartbeat"></i> MedScenario</div>
        <div class="navlinks">
            <a href="index.html">Home</a>
            <a href="diseases.html">Diseases</a>
            <a href="scenarios.html">Scenarios</a>
            <a href="competition.html">Competitions</a>
            <a href="admin.html">Admin</a>
        </div>
        <div class="nav-right">
            <div class="profile" id="profileBtn"><span id="userInitial">DR</span></div>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="profile.html">My Profile</a>
                <button id="logoutBtn">Logout</button>
            </div>
        </div>
    </div>

    <div class="admin-hero">
        <h1><i class="fas fa-trophy"></i> Advanced Competition Manager</h1>
        <p>Create and manage paid competitions with entry fees and prize pools</p>
    </div>

    <!-- Create Competition Form -->
    <div class="form-card">
        <h2><i class="fas fa-plus-circle"></i> Create New Competition</h2>
        <div class="form-group">
            <label>Competition Name</label>
            <input type="text" id="compName" placeholder="e.g., OBGYN Championship 2024">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="compCategory">
                <option value="OBGYN">OBGYN</option>
                <option value="Surgery">Surgery</option>
                <option value="Pediatrics">Pediatrics</option>
                <option value="Internal Medicine">Internal Medicine</option>
            </select>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="compDescription" rows="3" placeholder="Describe the competition..."></textarea>
        </div>
        <div class="form-group">
            <label>Entry Fee (points)</label>
            <input type="number" id="entryFee" value="500" placeholder="500">
        </div>
        <div class="form-group">
            <label>Total Questions</label>
            <input type="number" id="totalQuestions" value="30" placeholder="30">
        </div>
        <div class="form-group">
            <label>Time Per Question (seconds)</label>
            <input type="number" id="timePerQuestion" value="120" placeholder="120">
        </div>
        <div class="form-group">
            <label>Start Date & Time</label>
            <input type="datetime-local" id="startDate">
        </div>
        <button class="btn-primary" id="createCompBtn">Create Competition →</button>
    </div>

    <!-- Add Questions Section (shows after competition created) -->
    <div id="questionsSection" class="form-card" style="display: none;">
        <h2><i class="fas fa-question-circle"></i> Add Questions to <span id="currentCompName"></span></h2>
        <div id="questionsList"></div>
        <div id="addQuestionForm" style="margin-top: 20px; padding: 20px; background: #f8fafc; border-radius: 24px;">
            <h3>Add New Question</h3>
            <div class="form-group">
                <label>Question Text</label>
                <input type="text" id="qText" placeholder="Enter question...">
            </div>
            <div class="form-group">
                <label>Option A</label>
                <input type="text" id="optA" placeholder="Option A">
            </div>
            <div class="form-group">
                <label>Option B</label>
                <input type="text" id="optB" placeholder="Option B">
            </div>
            <div class="form-group">
                <label>Option C</label>
                <input type="text" id="optC" placeholder="Option C">
            </div>
            <div class="form-group">
                <label>Option D</label>
                <input type="text" id="optD" placeholder="Option D">
            </div>
            <div class="form-group">
                <label>Correct Answer (exact text)</label>
                <input type="text" id="correctAnswer" placeholder="e.g., A. Uterine atony">
            </div>
            <div class="form-group">
                <label>Explanation</label>
                <textarea id="explanation" rows="2" placeholder="Explain why this is correct..."></textarea>
            </div>
            <button class="btn-secondary" id="addQuestionBtn">+ Add Question</button>
        </div>
        <button class="btn-primary" id="saveQuestionsBtn" style="margin-top: 20px;">Save All Questions</button>
    </div>

    <!-- Existing Competitions -->
    <div class="form-card">
        <h2><i class="fas fa-list"></i> Existing Competitions</h2>
        <div id="competitionsList" class="competitions-grid">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    const API_URL = 'http://localhost:5000';
    let currentCompetitionId = null;
    let tempQuestions = [];

    function getToken() { return localStorage.getItem('token'); }

    function checkAuth() {
        const token = getToken();
        if (!token) { window.location.href = 'login.html'; return false; }
        return true;
    }

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    async function loadCompetitions() {
        try {
            const response = await fetch(`${API_URL}/api/advanced-competitions`, {
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            const data = await response.json();
            if (data.success && data.competitions.length > 0) {
                const container = document.getElementById('competitionsList');
                container.innerHTML = data.competitions.map(comp => `
                    <div class="comp-card">
                        <h3>${comp.name}</h3>
                        <p style="color:#6b7280; margin: 8px 0;">${comp.description || 'No description'}</p>
                        <p><strong>Entry Fee:</strong> ${comp.entryFee} points</p>
                        <p><strong>Prize Pool:</strong> ${comp.prizePool} points</p>
                        <p><strong>Questions:</strong> ${comp.totalQuestions}</p>
                        <p><strong>Participants:</strong> ${comp.participants?.length || 0}</p>
                        <span class="comp-status status-${comp.status}">${comp.status.toUpperCase()}</span>
                        <div style="margin-top: 12px;">
                            ${comp.status === 'upcoming' ? `<button class="btn-secondary" onclick="startCompetition('${comp._id}')" style="margin-right: 8px;">▶ Start</button>` : ''}
                            <button class="btn-primary" onclick="viewCompetition('${comp._id}')">View Details</button>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('competitionsList').innerHTML = '<div style="text-align:center; padding:40px;">No competitions created yet</div>';
            }
        } catch (error) {
            console.error('Error loading competitions:', error);
        }
    }

    document.getElementById('createCompBtn').onclick = async () => {
        const competitionData = {
            name: document.getElementById('compName').value,
            category: document.getElementById('compCategory').value,
            description: document.getElementById('compDescription').value,
            entryFee: parseInt(document.getElementById('entryFee').value),
            totalQuestions: parseInt(document.getElementById('totalQuestions').value),
            timePerQuestion: parseInt(document.getElementById('timePerQuestion').value),
            startDate: document.getElementById('startDate').value
        };

        if (!competitionData.name || !competitionData.startDate) {
            showToast('Please fill competition name and start date');
            return;
        }

        try {
            const response = await fetch(`${API_URL}/api/advanced-competitions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getToken()}`
                },
                body: JSON.stringify(competitionData)
            });
            const data = await response.json();
            if (data.success) {
                currentCompetitionId = data.competition._id;
                document.getElementById('currentCompName').innerText = data.competition.name;
                document.getElementById('questionsSection').style.display = 'block';
                showToast('Competition created! Now add questions.');
                loadCompetitions();
            } else {
                showToast('Error creating competition');
            }
        } catch (error) {
            showToast('Error creating competition');
        }
    };

    document.getElementById('addQuestionBtn').onclick = () => {
        const question = {
            text: document.getElementById('qText').value,
            options: [
                document.getElementById('optA').value,
                document.getElementById('optB').value,
                document.getElementById('optC').value,
                document.getElementById('optD').value
            ],
            correctAnswer: document.getElementById('correctAnswer').value,
            explanation: document.getElementById('explanation').value
        };

        if (!question.text || !question.options[0] || !question.correctAnswer) {
            showToast('Please fill question text, options, and correct answer');
            return;
        }

        tempQuestions.push(question);
        renderTempQuestions();
        
        // Clear form
        document.getElementById('qText').value = '';
        document.getElementById('optA').value = '';
        document.getElementById('optB').value = '';
        document.getElementById('optC').value = '';
        document.getElementById('optD').value = '';
        document.getElementById('correctAnswer').value = '';
        document.getElementById('explanation').value = '';
    };

    function renderTempQuestions() {
        const container = document.getElementById('questionsList');
        if (tempQuestions.length === 0) {
            container.innerHTML = '<p style="color:#6b7280;">No questions added yet. Add questions below.</p>';
            return;
        }
        container.innerHTML = tempQuestions.map((q, idx) => `
            <div class="question-item">
                <div class="question-header">
                    <strong>Question ${idx + 1}</strong>
                    <button class="btn-danger" onclick="removeQuestion(${idx})">Remove</button>
                </div>
                <div class="question-text">${q.text}</div>
                <div class="options">
                    ${q.options.map(opt => `<div class="option">${opt}</div>`).join('')}
                </div>
                <p><strong>Correct:</strong> ${q.correctAnswer}</p>
                <p><strong>Explanation:</strong> ${q.explanation}</p>
            </div>
        `).join('');
    }

    window.removeQuestion = (index) => {
        tempQuestions.splice(index, 1);
        renderTempQuestions();
    };

    document.getElementById('saveQuestionsBtn').onclick = async () => {
        if (tempQuestions.length === 0) {
            showToast('Please add at least one question');
            return;
        }

        try {
            const response = await fetch(`${API_URL}/api/advanced-competitions/${currentCompetitionId}/questions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getToken()}`
                },
                body: JSON.stringify({ questions: tempQuestions })
            });
            const data = await response.json();
            if (data.success) {
                showToast(`${tempQuestions.length} questions saved successfully!`);
                tempQuestions = [];
                renderTempQuestions();
                document.getElementById('questionsSection').style.display = 'none';
                loadCompetitions();
            } else {
                showToast('Error saving questions');
            }
        } catch (error) {
            showToast('Error saving questions');
        }
    };

    window.startCompetition = async (id) => {
        if (confirm('Start this competition? Users will be able to play immediately.')) {
            try {
                const response = await fetch(`${API_URL}/api/advanced-competitions/${id}/start`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.success) {
                    showToast('Competition started!');
                    loadCompetitions();
                }
            } catch (error) {
                showToast('Error starting competition');
            }
        }
    };

    window.viewCompetition = (id) => {
        window.location.href = `competition-detail.html?id=${id}`;
    };

    // UI Events
    document.getElementById('profileBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('dropdownMenu').classList.toggle('show'); };
    document.onclick = () => document.getElementById('dropdownMenu').classList.remove('show');
    document.getElementById('logoutBtn').onclick = logout;

    const user = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('userInitial').innerText = (user.name || 'DR').charAt(0).toUpperCase();

    if (checkAuth()) {
        loadCompetitions();
    }
</script>
</body>
</html>
